
<!DOCTYPE html>
<html>
<head>
<style>
  @import url('https://fonts.googleapis.com/css2?family=JetBrains+Mono:wght@400;700;800&display=swap');
  * { margin: 0; padding: 0; box-sizing: border-box; }
  body {
    background: #0d1117;
    display: flex;
    align-items: center;
    justify-content: center;
    min-height: 100vh;
    overflow: hidden;
  }
  .banner {
    width: 820px;
    height: 320px;
    position: relative;
    background: #060b14;
    border: 1px solid #30363d;
    border-radius: 12px;
    overflow: hidden;
    box-shadow: 0 0 80px rgba(88,166,255,0.08), 0 0 0 1px #21262d;
  }
  canvas { position: absolute; top:0; left:0; width:100%; height:100%; }
  .overlay {
    position: absolute; inset: 0;
    display: flex; flex-direction: column; justify-content: flex-end;
    padding: 28px 32px;
    background: linear-gradient(to top, rgba(6,11,20,0.88) 0%, rgba(6,11,20,0.3) 40%, transparent 70%);
    pointer-events: none;
  }
  .handle { font-family:'JetBrains Mono',monospace; font-size:13px; color:#58a6ff; letter-spacing:0.08em; margin-bottom:4px; opacity:0.85; }
  .name   { font-family:'JetBrains Mono',monospace; font-weight:800; font-size:36px; color:#e6edf3; letter-spacing:-0.5px; line-height:1; margin-bottom:10px; }
  .stats  { display:flex; gap:20px; font-family:'JetBrains Mono',monospace; font-size:11.5px; color:#7d8590; letter-spacing:0.04em; }
  .stats span { display:flex; align-items:center; gap:5px; }
  .dot { width:7px; height:7px; border-radius:50%; display:inline-block; }
  .badge { position:absolute; top:20px; right:24px; font-family:'JetBrains Mono',monospace; font-size:11px; color:#3fb950; border:1px solid #238636; background:rgba(35,134,54,0.12); padding:4px 10px; border-radius:20px; letter-spacing:0.06em; }
</style>
</head>
<body>
<div class="banner">
  <canvas id="c"></canvas>
  <div class="overlay">
    <div class="handle">@octocat</div>
    <div class="name">Code. Ship. Repeat.</div>
    <div class="stats">
      <span><span class="dot" style="background:#58a6ff"></span>2,847 commits</span>
      <span><span class="dot" style="background:#3fb950"></span>142 PRs merged</span>
      <span><span class="dot" style="background:#d2a8ff"></span>38 repos</span>
    </div>
  </div>
  <div class="badge">● Active</div>
</div>

<script>
const canvas = document.getElementById('c');
const ctx = canvas.getContext('2d');
const W = 820, H = 320;
canvas.width = W; canvas.height = H;

const RAINBOW = ['#ff0000','#ff8800','#ffff00','#33cc33','#2288ff','#aa00ff'];
const S = 7;

const stars = Array.from({length:130}, () => ({
  x: Math.random()*W, y: Math.random()*H,
  r: Math.random()*1.5+0.3,
  twinkle: Math.random()*Math.PI*2
}));

const sparkles = [];
function addSparkle(x, y) {
  sparkles.push({ x, y, life:1.0, size: Math.random()*7+3, angle: Math.random()*Math.PI*2 });
}

let catX = -160;
const CAT_Y = H / 2 + 5;
const SPEED = 1.2;
let frame = 0;

function drawRainbow(cx, cy, t) {
  const trailLen = 220;
  const stripeH = 2.5;
  const freq = 0.045;
  const amp = 6;
  const numStripes = RAINBOW.length;
  const steps = 80;
  const dx = trailLen / steps;
  for (let si = 0; si < numStripes; si++) {
    const baseOff = (si - numStripes/2 + 0.5) * stripeH * 2;
    ctx.beginPath();
    for (let i = 0; i <= steps; i++) {
      const px = cx - trailLen + i * dx;
      const wave = Math.sin(i * freq * Math.PI * 2 - t * 1.2) * amp;
      const py = cy + baseOff - stripeH + wave;
      if (i === 0) ctx.moveTo(px, py); else ctx.lineTo(px, py);
    }
    for (let i = steps; i >= 0; i--) {
      const px = cx - trailLen + i * dx;
      const wave = Math.sin(i * freq * Math.PI * 2 - t * 1.2) * amp;
      const py = cy + baseOff + stripeH + wave;
      ctx.lineTo(px, py);
    }
    ctx.closePath();
    ctx.fillStyle = RAINBOW[si];
    ctx.fill();
  }
}

function drawNyan(cx, cy, animFrame) {
  const leg = animFrame % 2;
  ctx.save();
  ctx.translate(cx, cy);

  // ── Poptart body ──────────────────────────────────────
  ctx.fillStyle = '#f5c98b';
  ctx.beginPath();
  ctx.roundRect(-S*3, -S*2.2, S*6, S*4.4, S*0.5);
  ctx.fill();

  ctx.fillStyle = '#ff99aa';
  ctx.beginPath();
  ctx.roundRect(-S*2.6, -S*1.8, S*5.2, S*3.6, S*0.4);
  ctx.fill();

  // Sprinkles
  const sprinkles = [
    [-1.5,-0.8,'#ff3399'],[0,-1.2,'#00ccff'],[-0.5,0.3,'#ffff00'],
    [1.0,-0.6,'#ff6600'],[-1.8,0.5,'#00ff88'],[1.5,0.4,'#ff33ff'],
    [0.8,1.0,'#ff3399'],[-1.0,1.1,'#00ccff']
  ];
  sprinkles.forEach(([sx,sy,sc]) => {
    ctx.fillStyle = sc;
    ctx.save();
    ctx.translate(sx*S, sy*S);
    ctx.rotate(Math.PI/4);
    ctx.fillRect(-S*0.18,-S*0.07,S*0.36,S*0.14);
    ctx.restore();
  });

  // ── Legs ──────────────────────────────────────────────
  ctx.fillStyle = '#999999';
  const legXs = [-S*2.0, -S*0.8, S*0.5, S*1.8];
  legXs.forEach((lx, i) => {
    const off = (i % 2 === 0) ? (leg ? S*0.3 : 0) : (leg ? 0 : S*0.3);
    ctx.fillRect(lx, S*2.0 - off, S*0.85, S*0.9 + off);
  });

  // ── Tail ──────────────────────────────────────────────
  const tailWag = Math.sin(frame * 0.25) * S * 0.8;
  ctx.fillStyle = '#999999';
  ctx.beginPath();
  ctx.moveTo(-S*3.0, -S*0.5);
  ctx.quadraticCurveTo(-S*5.2, -S*0.5 + tailWag, -S*5.0, -S*2.2 + tailWag);
  ctx.quadraticCurveTo(-S*4.8, -S*3.0 + tailWag, -S*4.2, -S*2.6 + tailWag);
  ctx.quadraticCurveTo(-S*4.5, -S*1.8 + tailWag, -S*4.6, -S*0.8 + tailWag);
  ctx.quadraticCurveTo(-S*4.2, S*0.2 + tailWag, -S*3.0, S*0.2);
  ctx.closePath();
  ctx.fill();

  // ── Cat HEAD (smooth, original style) ─────────────────
  const hx = S*3.0;
  const hy = -S*0.6;

  // Head base
  ctx.fillStyle = '#999999';
  ctx.beginPath();
  ctx.roundRect(hx - S*1.6, hy - S*1.8, S*3.2, S*3.0, S*0.5);
  ctx.fill();

  // Ears
  ctx.fillStyle = '#999999';
  ctx.beginPath();
  ctx.moveTo(hx - S*0.8, hy - S*1.8);
  ctx.lineTo(hx - S*1.1, hy - S*3.1);
  ctx.lineTo(hx - S*0.1, hy - S*1.8);
  ctx.closePath();
  ctx.fill();
  ctx.beginPath();
  ctx.moveTo(hx + S*0.3, hy - S*1.8);
  ctx.lineTo(hx + S*0.6, hy - S*3.1);
  ctx.lineTo(hx + S*1.4, hy - S*1.8);
  ctx.closePath();
  ctx.fill();

  // Inner ears
  ctx.fillStyle = '#ff88aa';
  ctx.beginPath();
  ctx.moveTo(hx - S*0.75, hy - S*1.85);
  ctx.lineTo(hx - S*1.0,  hy - S*2.8);
  ctx.lineTo(hx - S*0.2,  hy - S*1.85);
  ctx.closePath();
  ctx.fill();
  ctx.beginPath();
  ctx.moveTo(hx + S*0.35, hy - S*1.85);
  ctx.lineTo(hx + S*0.62, hy - S*2.8);
  ctx.lineTo(hx + S*1.3,  hy - S*1.85);
  ctx.closePath();
  ctx.fill();

  // Eyes — happy arc style
  ctx.strokeStyle = '#222222';
  ctx.lineWidth = 2;
  ctx.lineCap = 'round';
  ctx.beginPath();
  ctx.moveTo(hx - S*0.8, hy - S*0.55);
  ctx.lineTo(hx - S*0.45, hy - S*0.85);
  ctx.lineTo(hx - S*0.1,  hy - S*0.55);
  ctx.stroke();
  ctx.beginPath();
  ctx.moveTo(hx + S*0.15, hy - S*0.55);
  ctx.lineTo(hx + S*0.52, hy - S*0.85);
  ctx.lineTo(hx + S*0.9,  hy - S*0.55);
  ctx.stroke();

  // Nose
  ctx.fillStyle = '#ff6688';
  ctx.beginPath();
  ctx.ellipse(hx + S*1.05, hy + S*0.1, S*0.22, S*0.17, 0, 0, Math.PI*2);
  ctx.fill();

  // Mouth
  ctx.strokeStyle = '#222222';
  ctx.lineWidth = 1.5;
  ctx.beginPath();
  ctx.moveTo(hx + S*0.82, hy + S*0.25);
  ctx.lineTo(hx + S*1.05, hy + S*0.45);
  ctx.lineTo(hx + S*1.28, hy + S*0.25);
  ctx.stroke();

  // Whiskers
  ctx.strokeStyle = '#222222';
  ctx.lineWidth = 1;
  ctx.beginPath(); ctx.moveTo(hx + S*1.3, hy - S*0.15); ctx.lineTo(hx + S*2.4, hy - S*0.35); ctx.stroke();
  ctx.beginPath(); ctx.moveTo(hx + S*1.3, hy + S*0.05); ctx.lineTo(hx + S*2.4, hy + S*0.05); ctx.stroke();
  ctx.beginPath(); ctx.moveTo(hx + S*1.3, hy - S*0.15); ctx.lineTo(hx + S*2.4, hy + S*0.15); ctx.stroke();
  ctx.beginPath(); ctx.moveTo(hx - S*1.0, hy - S*0.15); ctx.lineTo(hx - S*1.9, hy - S*0.35); ctx.stroke();
  ctx.beginPath(); ctx.moveTo(hx - S*1.0, hy + S*0.05); ctx.lineTo(hx - S*1.9, hy + S*0.05); ctx.stroke();

  ctx.restore();
}

function drawStars() {
  stars.forEach(s => {
    s.twinkle += 0.035;
    ctx.save();
    ctx.globalAlpha = 0.35 + 0.55 * Math.abs(Math.sin(s.twinkle));
    ctx.fillStyle = '#ffffff';
    ctx.beginPath();
    ctx.arc(s.x, s.y, s.r, 0, Math.PI*2);
    ctx.fill();
    ctx.restore();
  });
}

function drawSparkle(sp) {
  ctx.save();
  ctx.globalAlpha = sp.life * 0.85;
  ctx.translate(sp.x, sp.y);
  ctx.rotate(sp.angle + frame*0.05);
  const sz = sp.size * sp.life;
  ctx.strokeStyle = '#ffffff';
  ctx.lineWidth = 1.5;
  for (let a = 0; a < 4; a++) {
    ctx.beginPath(); ctx.moveTo(0,-sz); ctx.lineTo(0,sz); ctx.stroke();
    ctx.rotate(Math.PI/4);
  }
  ctx.restore();
}

function loop() {
  ctx.clearRect(0, 0, W, H);
  const bg = ctx.createLinearGradient(0,0,0,H);
  bg.addColorStop(0,'#030812');
  bg.addColorStop(1,'#080f1e');
  ctx.fillStyle = bg;
  ctx.fillRect(0,0,W,H);

  drawStars();

  const t = frame * 0.016;
  drawRainbow(catX - S*3, CAT_Y, t);

  if (frame % 6 === 0 && catX > 20 && catX < W+20) {
    addSparkle(catX - S*3 - Math.random()*60, CAT_Y + (Math.random()-0.5)*50);
  }
  for (let i = sparkles.length-1; i >= 0; i--) {
    sparkles[i].life -= 0.035;
    if (sparkles[i].life <= 0) { sparkles.splice(i,1); continue; }
    drawSparkle(sparkles[i]);
  }

  drawNyan(catX, CAT_Y, Math.floor(frame / 10));

  catX += SPEED;
  if (catX > W + 200) catX = -200;

  frame++;
  requestAnimationFrame(loop);
}
loop();
</script>
</body>
</html>
